name: WhatsApp Dashboard Tracker

on:
  schedule:
    - cron: '0 */8 * * *'  # every 8 hours
  workflow_dispatch:         # manual trigger anytime

permissions:
  contents: write            # ← THIS fixes the push permission error

jobs:
  run-tracker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          SHEET_ID:                ${{ secrets.SHEET_ID }}
          WORKSHEET_INDEX:         ${{ secrets.WORKSHEET_INDEX }}
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: python tracker.py

      - name: Commit dashboard image to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboards/
          git diff --staged --quiet || git commit -m "📊 Dashboard update $(date +'%Y-%m-%d %H:%M UTC')"
          git push